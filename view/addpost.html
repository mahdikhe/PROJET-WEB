<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Post</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
    <div class="container">
        <header class="header">
            <div class="header-title">Create New Post</div>
            <div class="header-actions">
                <a href="cont.php" class="btn btn-outline">Back to Posts</a>
            </div>
        </header>

        <main class="main-content">
            <!-- Post creation -->
            <div class="card">
                <h2 class="card-title">Post Details</h2>
                <form action="add.php" method="POST" enctype="multipart/form-data" class="form-section">
                    <div class="form-grid">
                        
                        
                        <div class="form-group">
                            <label for="title" class="form-group label">Title</label>
                            <input type="text" id="title" name="title" placeholder="Enter post title" class="form-control">
                        </div>
                        
                        <div class="form-group">
                            <label for="author" class="form-group label">Author</label>
                            <input type="text" id="author" name="author" placeholder="Enter author name" class="form-control">
                        </div>
                        
                        <div class="form-group">
                            <label for="created_at" class="form-group label">Created At</label>
                            <input type="datetime-local" id="created_at" name="created_at" class="form-control">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="content" class="form-group label">Content</label>
                        <textarea id="content" name="content" placeholder="Enter post content" class="form-control" style="min-height: 150px; resize: vertical;"></textarea>
                    </div>
                    
                    <div class="file-input-container">
                        <label class="file-input-label">Post Image</label>
                        <div class="file-input-wrapper">
                            <div class="file-input-text">No file chosen</div>
                            <div class="file-input-button">Choose File</div>
                            <input type="file" id="image" name="image" accept="image/*" onchange="updateFileName(this)">
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Submit Post</button>
                    </div>
                </form>
            </div>
        </main>
    </div>
  

    <script>
    function updateFileName(input) {
        const fileName = input.files[0] ? input.files[0].name : 'No file chosen';
        input.parentElement.querySelector('.file-input-text').textContent = fileName;
    }
    </script>
</body>
</html>
